name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }} (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 — default (journald)
          - target: x86_64-unknown-linux-gnu
            variant: default
            build_flags: ""
            suffix: ""
            use_cross: false
          # x86_64 — syslog-only
          - target: x86_64-unknown-linux-gnu
            variant: syslog-only
            build_flags: "--no-default-features"
            suffix: "-syslog-only"
            use_cross: false
          # aarch64 — default (journald)
          - target: aarch64-unknown-linux-gnu
            variant: default
            build_flags: ""
            suffix: ""
            use_cross: true
          # aarch64 — syslog-only
          - target: aarch64-unknown-linux-gnu
            variant: syslog-only
            build_flags: "--no-default-features"
            suffix: "-syslog-only"
            use_cross: true
          # armv7 — default (journald)
          - target: armv7-unknown-linux-gnueabihf
            variant: default
            build_flags: ""
            suffix: ""
            use_cross: true
          # armv7 — syslog-only
          - target: armv7-unknown-linux-gnueabihf
            variant: syslog-only
            build_flags: "--no-default-features"
            suffix: "-syslog-only"
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "VERSION=$CARGO_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (native x86_64 default build)
        if: matrix.target == 'x86_64-unknown-linux-gnu' && matrix.variant == 'default'
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ matrix.variant }}-${{ hashFiles('**/Cargo.toml') }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.build_flags }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.build_flags }}

      - name: Package tarball
        run: |
          ARCHIVE_NAME="spotflowd-${VERSION}-${{ matrix.target }}${{ matrix.suffix }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/spotflowd" "${ARCHIVE_NAME}/"
          cp config/spotflowd.toml.example "${ARCHIVE_NAME}/"
          cp systemd/spotflowd.service "${ARCHIVE_NAME}/"
          [ -f LICENSE.MD ] && cp LICENSE.MD "${ARCHIVE_NAME}/" || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}.tar.gz

  publish-release:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Move all tarballs into release/
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          # Copy install script
          cp install.sh release/
          # Generate checksums
          cd release
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
